name: city_fix_app
description: "A Flutter application for reporting city issues."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.8.0

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.1.4

  # Local Storage — Offline-First Layer
  drift: ^2.20.3
  drift_flutter: ^0.2.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # Unique IDs for local records
  uuid: ^4.5.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  google_maps_flutter_web: ^0.5.5
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # UI Components
  fluttertoast: ^8.2.5
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Auth & DI
  google_sign_in: ^6.2.1
  provider: ^6.1.5+1
  get_it: ^7.7.0
  equatable: ^2.0.5
  google_sign_in_web: ^0.12.4+4
  crypto: ^3.0.3
  flutter_dotenv: ^5.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  go_router: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 600
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 700
