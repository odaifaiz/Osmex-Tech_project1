name: city_fix_app
description: "City Fix - تطبيق إصلاح المدينة"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.0.2
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  path: ^1.9.0

  intl: ^0.20.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Location & Maps
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  
  # Notifications
  
  flutter_local_notifications: ^17.2.1+1
  
  # Utilities
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  
  # Security
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    # - assets/images/onboarding/
    # - assets/images/empty_states/
    - assets/icons/
    # - assets/icons/categories/
    # - assets/icons/status/
    # - assets/animations/
    - assets/translations/ar.json
    - assets/translations/en.json

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900
    
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700