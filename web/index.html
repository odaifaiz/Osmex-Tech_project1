<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- ✅ Google Maps API Script (Must be loaded first) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCX5eMyxP8zCH-4igkrv2aQwJQRBh3l0Z8&v=3.exp&libraries=geometry,places"></script>


  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- في ملف web/index.html، داخل قسم <head> -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="credentialless">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="city_fix_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="google-signin-client_id" content="749309119315-63vsrs6635m81kf80c10safoj6neafd0.apps.googleusercontent.com
">


 <!-- ✅ 2. Load Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>


  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>city_fix_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Main Flutter script -->
  <!-- <script src="main.dart.js" type="application/javascript"></script> -->
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // ✅ Global callback for Google Sign-In
    window.handleGoogleSignIn = function(response) {
      if (response.credential) {
        if (window.flutterWebGoogleSignIn) {
          window.flutterWebGoogleSignIn(response.credential);
        }
      }
    };
    
    // ✅ Render Google Sign-In button
    window.onload = function() {
      if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
        google.accounts.id.initialize({
          client_id: '749309119315-63vsrs6635m81kf80c10safoj6neafd0.apps.googleusercontent.com',
          callback: window.handleGoogleSignIn,
          ux_mode: 'redirect',  // ✅ تجنب مشكلة popup
        });
        google.accounts.id.renderButton(
          document.getElementById('google-signin-button'),
          { type: 'standard', theme: 'outline', size: 'large', text: 'signin_with' }
        );
      }
    };
  </script>


<!-- مكان زر Google Sign-In -->
  <div id="google-signin-button" style="display: none;"></div>
</body>
</html>
