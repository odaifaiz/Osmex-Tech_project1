<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تأكيد إرسال البلاغ - CityFix</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1abc3a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112114",
                    },
                    fontFamily: {
                        "display": ["Noto Sans Arabic", "Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans Arabic', 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<nav class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-center border-b border-primary/10">
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100">تم إرسال البلاغ</h2>
</nav>
<main class="flex-1 flex flex-col items-center px-6 py-8 max-w-md mx-auto w-full">
<!-- Step Indicator -->
<div class="flex gap-2 mb-10 w-full justify-center">
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
</div>
<!-- Success Visual -->
<div class="relative mb-6">
<div class="w-24 h-24 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-7xl fill-icon">check_circle</span>
</div>
<div class="absolute -top-1 -right-1 w-6 h-6 bg-primary rounded-full border-4 border-background-light dark:border-background-dark"></div>
</div>
<!-- Success Messages -->
<div class="text-center mb-8">
<h1 class="text-2xl font-bold mb-3 text-slate-900 dark:text-slate-100">✅ تم الإرسال بنجاح!</h1>
<p class="text-slate-600 dark:text-slate-400 leading-relaxed">شكراً لمساهمتك في تحسين مدينتك! بلاغك يساعدنا على جعل الحي أفضل للجميع.</p>
</div>
<!-- Report ID Card -->
<div class="w-full bg-white dark:bg-slate-800/50 rounded-2xl p-5 shadow-sm border border-primary/10 mb-6">
<div class="flex items-center justify-between gap-4">
<div class="flex flex-col gap-1">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">رقم البلاغ</span>
<p class="text-xl font-bold text-primary tabular-nums">#R-2024-001</p>
<p class="text-sm text-slate-500 dark:text-slate-400">احفظه للرجوع إليه لاحقاً</p>
</div>
<button class="h-12 w-12 flex items-center justify-center rounded-xl bg-primary/10 text-primary hover:bg-primary/20 transition-colors" title="نسخ الرقم">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
</div>
<!-- Review Time Info -->
<div class="w-full flex items-center gap-4 bg-primary/5 dark:bg-primary/10 rounded-xl p-4 border border-primary/20 mb-10">
<div class="h-10 w-10 flex-shrink-0 bg-primary/10 dark:bg-primary/20 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">schedule</span>
</div>
<div>
<p class="text-sm font-bold text-slate-800 dark:text-slate-200">سيتم المراجعة خلال 24 ساعة</p>
<p class="text-xs text-slate-500 dark:text-slate-400">تنبيه المراجعة التلقائي</p>
</div>
</div>
<!-- Map Mini-Preview (Optional Style addition from component list) -->
<div class="w-full mb-8 rounded-xl overflow-hidden h-32 relative border border-primary/10">
<div class="absolute inset-0 bg-center bg-cover" data-alt="خريطة توضح موقع البلاغ المسجل في المدينة" data-location="Riyadh" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDPjz7ePva5V0HVkYfSu3G7ka_NUtjjRsfgAVeEKzmh5IF9vi00YduL-LD9EEnjwSVxx8Uu5lcdppYH2U7vGpc-TEUN-ohJvvOxIKyV_l2ltpHJoLNlm8DB6_ZotslK3QcRmLo0It6xm-zFiHZ3h2D94I5HeC24jIGBVaE89VUMRQWe2RQDiy4RwzoVJKI7s-66X5E_q0FHh0yGHAVc46JqZ1rnldU_RNzdDZVX2Lswl_1Se57qyDS3kwujPQTCV1vvZaUxjVPkLHvu");'></div>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex items-end p-3">
<span class="text-white text-xs font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-sm">location_on</span>
                    حي الملقا، الرياض
                </span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3 mt-auto">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-base flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span>عرض حالة البلاغ</span>
<span class="material-symbols-outlined">arrow_back</span>
</button>
<button class="w-full h-14 bg-transparent border-2 border-primary/30 text-primary rounded-xl font-bold text-base flex items-center justify-center hover:bg-primary/5 active:scale-[0.98] transition-transform">
                العودة للرئيسية
            </button>
</div>
</main>
<!-- Footer Decoration -->
<footer class="py-6 flex justify-center opacity-30 pointer-events-none">
<div class="h-1 w-24 bg-slate-400 dark:bg-slate-600 rounded-full"></div>
</footer>
</body></html>
